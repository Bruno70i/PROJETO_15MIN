openapi: 3.0.3
info:
  title: API de Alcançabilidade Urbana — Cidade de 15 Minutos
  version: 1.0.0
  description: >-
    API REST para consultar índices de alcançabilidade urbana baseados no conceito de Cidade de 15 Minutos.
    Dados de mobilidade urbana fornecidos sob licença ODbL pelos colaboradores do OpenStreetMap (OSM).
servers:
  - url: http://localhost:3000/api/v1
paths:
  /saude:
    get:
      summary: Health check da API e do banco
      responses:
        '200':
          description: Status da API e conectividade com o banco
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  banco:
                    type: boolean
                    example: true
  /cidades:
    get:
      summary: Lista cidades processadas
      responses:
        '200':
          description: Lista de cidades com estatísticas agregadas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CidadeResumida'
  /cidades/{id}:
    get:
      summary: Detalhe de uma cidade e seus índices por categoria
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Dados detalhados da cidade e lista de índices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CidadeDetalhada'
        '404':
          description: Cidade não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /cidades/{id}/moreno:
    get:
      summary: Diagnóstico Moreno Dinâmico da cidade (Fase 10)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: categorias
          in: query
          required: false
          schema:
            type: string
            example: "saude,educacao,mercado"
        - name: velocidade
          in: query
          required: false
          schema:
            type: number
            minimum: 2.0
            maximum: 6.0
            example: 4.5
      responses:
        '200':
          description: Diagnóstico Moreno recalculado dinamicamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MorenoDinamico'
        '400':
          description: Parâmetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '404':
          description: Cidade não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /cidades/{id}/servicos:
    get:
      summary: Retorna serviços mapeados na cidade em formato GeoJSON
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: categoria
          in: query
          required: false
          schema:
            type: string
            example: saude
      responses:
        '200':
          description: Coleção de pontos GeoJSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    example: FeatureCollection
                  features:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          example: Feature
                        geometry:
                          type: object
                          properties:
                            type:
                              type: string
                              example: Point
                            coordinates:
                              type: array
                              items:
                                type: number
                              example: [-46.4028, -24.0058]
                        properties:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 45
                            nome:
                              type: string
                              nullable: true
                              example: "Hospital Municipal"
                            categoria:
                              type: string
                              example: "saude"
                            rotulo:
                              type: string
                              example: "Saúde (hospitais)"
        '400':
          description: Parâmetro inválido ou sem filtro se limite excedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /cidades/{id}/isocronas:
    get:
      summary: Retorna isócronas em formato GeoJSON para uma categoria
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: categoria
          in: query
          required: true
          schema:
            type: string
            example: saude
        - name: minutos
          in: query
          required: false
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: MultiPolígono GeoJSON da isócrona
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Isócrona não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /cidades/{id}/mapa:
    get:
      summary: Amostra de nós para o mapa de calor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: categoria
          in: query
          required: true
          schema:
            type: string
        - name: max
          in: query
          required: false
          schema:
            type: integer
            default: 3000
        - name: velocidade
          in: query
          required: false
          schema:
            type: number
            minimum: 2.0
            maximum: 6.0
        - name: categorias
          in: query
          required: false
          schema:
            type: string
            description: CSV de chaves de categorias (usado com categoria=plena)
      responses:
        '200':
          description: Amostra de pontos para renderização de calor
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    lat:
                      type: number
                      example: -24.0058
                    lon:
                      type: number
                      example: -46.4028
                    tempo_min:
                      type: number
                      nullable: true
                      example: 8.5
                    dentro_limiar:
                      type: boolean
                      example: true
  /alcancabilidade:
    get:
      summary: Detalha alcançabilidade de um ponto clicado no mapa
      parameters:
        - name: cidade_id
          in: query
          required: true
          schema:
            type: integer
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lon
          in: query
          required: true
          schema:
            type: number
        - name: velocidade
          in: query
          required: false
          schema:
            type: number
            minimum: 2.0
            maximum: 6.0
      responses:
        '200':
          description: Detalhes do nó mais próximo e tempos de acesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetalhamentoPonto'
        '404':
          description: Ponto fora da área processada da cidade
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /comparar:
    get:
      summary: Compara índices de até 5 cidades
      parameters:
        - name: cidades
          in: query
          required: true
          schema:
            type: string
            example: "1,2"
      responses:
        '200':
          description: Lista de dados comparativos das cidades
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    cidade:
                      $ref: '#/components/schemas/CidadeResumida'
                    indices:
                      type: array
                      items:
                        $ref: '#/components/schemas/IndiceCategoria'
                    moreno:
                      $ref: '#/components/schemas/Moreno'
                      nullable: true
        '400':
          description: Mais de 5 cidades solicitadas ou IDs inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /rota:
    get:
      summary: Rota a pé pela malha viária entre dois nós do grafo
      description: >-
        Calcula, via Dijkstra sobre as arestas reais do OpenStreetMap, o
        caminho a pé entre dois nós da cidade e retorna o traçado como
        GeoJSON LineString. Os identificadores 'de' e 'para' são osm_id de
        nós — obtidos, por exemplo, em /alcancabilidade (campos no.osm_id e
        categorias[].servico_mais_proximo.osm_no_id).
      parameters:
        - name: cidade_id
          in: query
          required: true
          schema:
            type: integer
          example: 10
        - name: de
          in: query
          required: true
          schema:
            type: string
          example: "2062713466"
        - name: para
          in: query
          required: true
          schema:
            type: string
          example: "633283351"
        - name: velocidade
          in: query
          required: false
          schema:
            type: number
            minimum: 2.0
            maximum: 6.0
      responses:
        '200':
          description: Rota encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  tempo_min:
                    type: number
                    example: 7.32
                  qtd_nos_caminho:
                    type: integer
                    example: 25
                  geojson:
                    type: object
                    properties:
                      type:
                        type: string
                        example: LineString
                      coordinates:
                        type: array
                        items:
                          type: array
                          items:
                            type: number
                        example: [[-46.4028, -24.0058], [-46.4031, -24.0052]]
        '400':
          description: Parâmetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '404':
          description: Cidade sem malha gravada ou caminho inexistente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /processamentos:
    post:
      summary: Dispara o processamento de uma nova cidade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                consulta_osm:
                  type: string
                  example: "Santos, São Paulo, Brazil"
              required:
                - consulta_osm
      responses:
        '202':
          description: Processamento iniciado
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  consulta_osm:
                    type: string
                  status:
                    type: string
                    example: "rodando"
        '200':
          description: Cidade já processada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ja_processada:
                    type: boolean
                    example: true
                  cidade_id:
                    type: integer
                    example: 10
        '400':
          description: Parâmetro inválido ou injeção de parâmetros detectada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '409':
          description: Já existe um processamento em andamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /processamentos/atual:
    get:
      summary: Retorna o progresso do job atual em andamento ou último concluído
      responses:
        '200':
          description: Status do job de processamento
          content:
            application/json:
              schema:
                type: object
                properties:
                  job:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: string
                      consulta_osm:
                        type: string
                      status:
                        type: string
                        example: "rodando"
                      pct:
                        type: integer
                        example: 45
                      etapa:
                        type: string
                        example: "calculo"
                      msg:
                        type: string
                        example: "Calculando alcancabilidade para saude"
                      iniciadoEm:
                        type: string
                        format: date-time
                      terminadoEm:
                        type: string
                        format: date-time
                        nullable: true
                      cidadeId:
                        type: integer
                        nullable: true
                      codigoSaida:
                        type: integer
                        nullable: true
components:
  schemas:
    CidadeResumida:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Praia Grande"
        pais:
          type: string
          example: "Brazil"
        consulta_osm:
          type: string
          example: "Praia Grande, São Paulo, Brazil"
        data_calculo:
          type: string
          format: date-time
          example: "2026-07-03T10:00:00Z"
        qtd_nos:
          type: integer
          example: 6500
        limiar_minutos:
          type: integer
          example: 15
        indice_geral:
          type: number
          example: 78.45
    CidadeDetalhada:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "Praia Grande"
        pais:
          type: string
          example: "Brazil"
        consulta_osm:
          type: string
        data_calculo:
          type: string
          format: date-time
        qtd_nos:
          type: integer
        qtd_arestas:
          type: integer
        tempo_execucao_s:
          type: number
        velocidade_kmh:
          type: number
        limiar_minutos:
          type: integer
        indices:
          type: array
          items:
            $ref: '#/components/schemas/IndiceCategoria'
        moreno:
          $ref: '#/components/schemas/Moreno'
          nullable: true
    IndiceCategoria:
      type: object
      properties:
        chave:
          type: string
          example: "saude"
        rotulo:
          type: string
          example: "Saúde (hospitais)"
        cor_hex:
          type: string
          example: "#e74c3c"
        tempo_medio_min:
          type: number
          nullable: true
          example: 12.34
        pct_dentro_limiar:
          type: number
          example: 85.20
        indice:
          type: number
          example: 85.20
    DetalhamentoPonto:
      type: object
      properties:
        no:
          type: object
          properties:
            osm_id:
              type: integer
              format: int64
              example: 457812
            lat:
              type: number
            lon:
              type: number
            distancia_m:
              type: number
              example: 15.4
        indice_ponto:
          type: number
          example: 75.0
        categorias:
          type: array
          items:
            type: object
            properties:
              chave:
                type: string
              rotulo:
                type: string
              cor_hex:
                type: string
              tempo_min:
                type: number
                nullable: true
                example: 10.2
              dentro_limiar:
                type: boolean
                example: true
              servico_mais_proximo:
                type: object
                nullable: true
                properties:
                  id:
                    type: integer
                  nome:
                    type: string
                    nullable: true
                  lat:
                    type: number
                  lon:
                    type: number
    Erro:
      type: object
      properties:
        erro:
          type: string
          example: "Cidade não encontrada"
        codigo:
          type: integer
          example: 404
    Moreno:
      type: object
      properties:
        limiar_minutos:
          type: integer
          example: 15
        pct_cobertura_plena:
          type: number
          example: 78.45
        minutos_cidade:
          type: integer
          nullable: true
          example: 22
        tempo_pior_medio:
          type: number
          nullable: true
          example: 18.23
        tempo_pior_mediana:
          type: number
          nullable: true
          example: 16.50
        pct_nos_sem_cobertura:
          type: number
          example: 12.30
        atende_conceito:
          type: boolean
          example: false
        classificacao:
          type: string
          example: "Parcialmente aderente"
        categoria_gargalo:
          type: object
          nullable: true
          properties:
            chave:
              type: string
              example: "saude"
            rotulo:
              type: string
              example: "Saúde (hospitais)"
            cor_hex:
              type: string
              example: "#e74c3c"
        pct_gargalo:
          type: number
          nullable: true
          example: 45.20
        categorias_ausentes:
          type: array
          items:
            type: object
            properties:
              chave:
                type: string
              rotulo:
                type: string
        distribuicao:
          type: array
          items:
            type: object
            properties:
              faixa:
                type: string
                example: "0-5"
              qtd:
                type: integer
                example: 125
    MorenoDinamico:
      type: object
      properties:
        limiar_minutos:
          type: integer
          example: 15
        pct_cobertura_plena:
          type: number
          example: 78.45
        minutos_cidade:
          type: integer
          nullable: true
          example: 22
        tempo_pior_medio:
          type: number
          nullable: true
          example: 18.23
        tempo_pior_mediana:
          type: number
          nullable: true
          example: 16.50
        pct_nos_sem_cobertura:
          type: number
          example: 12.30
        atende_conceito:
          type: boolean
          example: false
        classificacao:
          type: string
          example: "Parcialmente aderente"
        categoria_gargalo:
          type: object
          nullable: true
          properties:
            chave:
              type: string
              example: "saude"
            rotulo:
              type: string
              example: "Saúde (hospitais)"
            cor_hex:
              type: string
              example: "#e74c3c"
        pct_gargalo:
          type: number
          nullable: true
          example: 45.20
        categorias_ausentes:
          type: array
          items:
            type: object
            properties:
              chave:
                type: string
              rotulo:
                type: string
        distribuicao:
          type: array
          items:
            type: object
            properties:
              faixa:
                type: string
                example: "0-5"
              qtd:
                type: integer
                example: 125
        categorias_resultado:
          type: array
          items:
            type: object
            properties:
              chave:
                type: string
                example: "saude"
              rotulo:
                type: string
                example: "Saúde (hospitais)"
              cor_hex:
                type: string
                example: "#e74c3c"
              pct_dentro:
                type: number
                example: 85.20
        parametros:
          type: object
          properties:
            categorias_usadas:
              type: array
              items:
                type: string
                example: "saude"
            velocidade_kmh:
              type: number
              example: 4.5
            dinamico:
              type: boolean
              example: true
