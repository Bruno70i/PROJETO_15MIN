<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma de Alcançabilidade Urbana — Cidade de 15 Minutos</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- Estilos customizados -->
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

  <!-- Barra Superior -->
  <header class="header-bar">
    <div class="brand">
      <h1>Cidade de 15 Minutos</h1>
    </div>
    
    <div class="controls">
      <label for="cidade-select" style="font-size: 0.9rem; font-weight: 600; color: #64748b;">Cidade:</label>
      <select id="cidade-select" aria-label="Seletor de Cidade">
        <option value="0">Carregando cidades...</option>
      </select>
      
      <nav class="nav-links" aria-label="Navegação Principal">
        <a href="index.html" class="active">Mapa</a>
        <a href="comparar.html">Comparar</a>
        <a href="sobre.html">Sobre</a>
      </nav>
    </div>
  </header>

  <!-- Container Principal -->
  <main class="main-container">
    <!-- Mapa OSM / Leaflet -->
    <div id="map" role="application" aria-label="Mapa interativo do OpenStreetMap"></div>
    
    <!-- Painel Lateral -->
    <aside class="side-panel" aria-label="Resultados de alcançabilidade">
      <div class="panel-header">
        <h2>Analise de Alcançabilidade</h2>
        <button id="toggle-panel-btn" style="background:none; border:none; color:var(--primary-color); font-weight:600; cursor:pointer;" aria-label="Fechar painel">Ocultar</button>
      </div>
      
      <!-- Controles de Camadas dentro do Painel -->
      <div style="padding: 10px 20px 0 20px;">
        <div class="layer-controls">
          <div class="layer-control-title">Filtros & Camadas</div>
          
          <!-- Seletor de Minutos Isócronas -->
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <span style="font-size:0.8rem; font-weight:600;">Tempo de Isocrona:</span>
            <select id="isocrona-minutos-select" style="padding:2px 6px; font-size:0.8rem; border-radius:4px; border:1px solid var(--border-color);">
              <option value="5">5 min</option>
              <option value="10">10 min</option>
              <option value="15" selected>15 min</option>
            </select>
          </div>
          
          <!-- Lista de Isócronas por Categoria -->
          <div id="isocronas-check-container" style="display:flex; flex-direction:column; gap:6px;">
            <!-- Gerado via JS -->
          </div>
          
          <hr style="border:none; border-top:1px solid var(--border-color); margin:8px 0;">
          
          <!-- Mapa Geral de Calor (Nós) -->
          <div style="display:flex; flex-direction:column; gap:6px;">
            <label class="layer-checkbox">
              <input type="checkbox" id="heatmap-toggle">
              <strong>Ver Mapa de Calor (Nós)</strong>
            </label>
            <select id="heatmap-categoria-select" style="padding:4px 6px; font-size:0.8rem; border-radius:4px; border:1px solid var(--border-color); width:100%;" disabled>
              <option value="">Selecione a categoria...</option>
            </select>
          </div>
        </div>
      </div>
      
      <!-- Resultados do Ponto Clicado -->
      <div class="panel-content" id="panel-results">
        <p class="info-msg" style="text-align:center; color:#64748b; font-size:0.9rem; padding: 20px;">
          Selecione uma cidade e clique em qualquer ponto do mapa para ver o tempo de alcancabilidade dos servicos.
        </p>
      </div>
    </aside>
  </main>

  <!-- Container de Toasts para Notificações -->
  <div class="toast-container" id="toast-container" aria-live="assertive"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <!-- Código de Controle Principal -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
